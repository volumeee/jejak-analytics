services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jejak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jejak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jejak_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jejak_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jejak -d jejak_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jejak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Analytics Server ────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jejak-server
    restart: unless-stopped
    ports:
      - "${PORT:-3100}:3100"
    volumes:
      - ./tracker/dist:/app/public:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jejak}:${POSTGRES_PASSWORD:-jejak_secret}@postgres:5432/${POSTGRES_DB:-jejak_analytics}
      REDIS_URL: redis://redis:6379
      PORT: 3100
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3101}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Dashboard ───────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: jejak-dashboard
    restart: unless-stopped
    ports:
      - "3101:80"
    depends_on:
      - server

volumes:
  pgdata:
